<div id="ui-popups" class="ui-layer">
    <div id="live-subtitles" class="live-subtitles-bar hidden">
        <span class="subtitles-badge">Direct Transcribe</span>
        <span id="subtitles-text">En attente de voix...</span>
    </div>
    <div class="popup-container" id="popup-container" aria-live="polite"></div>
</div>

<div id="ui-sidebar" class="ui-layer hidden">
    <div class="sidebar-container">
        <div class="sidebar-header">
            <div>
                <p class="eyebrow">InTruth TV</p>
                <h2>Historique</h2>
            </div>
            <span class="sidebar-count" id="sidebar-count">0</span>
        </div>
        <div class="sidebar-feed" id="sidebar-feed">
            <div class="empty-state" id="sidebar-empty">Aucune verification pour le moment.</div>
        </div>
    </div>
</div>

<div id="dev-panel" class="dev-panel">
    <button class="dev-header" id="dev-header-toggle" type="button" aria-expanded="false" aria-controls="dev-content">
        <span class="dev-title"><i data-lucide="settings"></i> Parametres IA</span>
        <i id="toggle-icon" data-lucide="chevron-down"></i>
    </button>
    <div class="dev-content" id="dev-content" style="display: none;">
        <div class="control-group">
            <label>Source de donnees :</label>
            <div class="toggle-switch">
                <button class="btn active" id="btn-mode-sim" type="button">Simulation</button>
                <button class="btn" id="btn-mode-live" type="button">Microphone (Live IA)</button>
            </div>
        </div>

        <div class="control-group live-settings hidden" id="live-settings-panel">
            <label for="api-key-input">Cle API</label>
            <input type="password" id="api-key-input" placeholder="Cle Groq, Gemini ou Claude" autocomplete="off" spellcheck="false">

            <label for="llm-model">Modele</label>
            <select id="llm-model">
                <option value="llama-3.3-70b-versatile" data-provider="groq">Groq: Llama 3.3 70B</option>
                <option value="openai/gpt-oss-120b" data-provider="groq">Groq: GPT-OSS 120B</option>
                <option value="openai/gpt-oss-20b" data-provider="groq">Groq: GPT-OSS 20B</option>
                <option value="meta-llama/llama-4-scout-17b-16e-instruct" data-provider="groq">Groq: Llama 4 Scout 17B</option>
                <option value="llama-3.1-8b-instant" data-provider="groq">Groq: Llama 3.1 8B Instant</option>
                <option value="gemini-1.5-flash" data-provider="gemini">Gemini 1.5 Flash</option>
                <option value="gemini-1.5-pro" data-provider="gemini">Gemini 1.5 Pro</option>
                <option value="claude-3-5-sonnet-latest" data-provider="claude">Claude 3.5 Sonnet</option>
            </select>

            <button class="action-btn" id="btn-start-listening" type="button">
                <i data-lucide="mic"></i>
                <span>Demarrer l'ecoute</span>
            </button>
            <p id="mic-status" class="status-text">Microphone inactif</p>
            <p id="check-status" class="check-status muted">Pret pour le fact-checking.</p>
            <div class="transcript-debug" id="transcript-debug">En attente de voix...</div>
        </div>

        <div class="control-group sim-settings" id="sim-settings-panel">
            <label>Test manuel de l'interface :</label>
            <div class="sim-actions">
                <button class="btn verdict-btn error" id="btn-sim-false" type="button">Faux</button>
                <button class="btn verdict-btn misleading" id="btn-sim-misleading" type="button">Nuance</button>
                <button class="btn verdict-btn true" id="btn-sim-true" type="button">Vrai</button>
            </div>
        </div>
    </div>
</div>

<button id="btn-toggle-history" class="history-toggle-btn" type="button">
    <i data-lucide="panel-right-open"></i>
    <span>Historique</span>
</button>
