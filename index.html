<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InTruth TV - Prototype Live</title>
    <!-- Police Inter pour le rendu Apple -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Fond TV (Gradient dynamique Apple ou Vidéo YouTube) -->
    <div class="tv-container" id="tv-container">
        <div class="tv-fallback" id="tv-fallback">
            <h1>EN DIRECT</h1>
        </div>
        <iframe id="youtube-player" src="" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        <div class="video-overlay"></div>
    </div>

    <!-- UI: Option A - Popups (Mode Apple / Centré) -->
    <div id="ui-popups" class="ui-layer">
        <!-- Barre de sous-titres de débogage (activée pendant l'écoute live) -->
        <div id="live-subtitles" class="live-subtitles-bar hidden">
            <span class="subtitles-badge">Direct Transcribe</span>
            <span id="subtitles-text">En attente de voix...</span>
        </div>
        <div class="popup-container" id="popup-container">
            <!-- Les popups seront injectés ici -->
        </div>
    </div>

    <!-- UI: Option B - Volet Latéral Droit (Historique complet) -->
    <div id="ui-sidebar" class="ui-layer hidden">
        <div class="sidebar-container">
            <div class="sidebar-header">
                <h2>Fact-Check History</h2>
            </div>
            <div class="sidebar-feed" id="sidebar-feed">
                <!-- Les cartes historiques seront injectées ici -->
            </div>
        </div>
    </div>

    <!-- Menu Paramètres (Discret, en haut à droite) -->
    <div id="dev-panel" class="dev-panel">
        <div class="dev-header" id="dev-header-toggle">
            <h3>⚙️ Paramètres de l'IA</h3>
            <span id="toggle-icon">▼</span>
        </div>
        <div class="dev-content" id="dev-content" style="display: none;">


            <div class="control-group">
                <label>Source de données :</label>
                <div class="toggle-switch">
                    <button class="btn active" id="btn-mode-sim">Simulation</button>
                    <button class="btn" id="btn-mode-live">Microphone (Live IA)</button>
                </div>
            </div>

            <div class="control-group">
                <label>Vidéo YouTube (Débat en arrière-plan) :</label>
                <div style="display:flex; gap: 8px;">
                    <input type="text" id="yt-url-input" placeholder="Ex: https://www.youtube.com/watch?v=elgTG9oDiJY" value="https://www.youtube.com/watch?v=elgTG9oDiJY" style="margin-bottom:0;" />
                    <button class="btn active" id="btn-load-yt" style="max-width:80px; flex:none;">Charger</button>
                </div>
            </div>

            <div class="control-group live-settings hidden" id="live-settings-panel">
                <label>Clé API (Gemini, Claude, ou Groq) :</label>
                <input type="password" id="api-key-input" placeholder="Clé secrète..." />
                <select id="llm-model">
                    <option value="gemini-3.5-flash" data-provider="gemini">Gemini 3.5 Flash (Recommandé)</option>
                    <option value="gemini-3.1-pro" data-provider="gemini">Gemini 3.1 Pro (Raisonnement)</option>
                    <option value="llama-3.3-70b-versatile" data-provider="groq">Groq: Llama 3.3 70B (Gratuit)</option>
                    <option value="meta-llama/llama-4-scout-17b-16e-instruct" data-provider="groq">Groq: Llama 4 Scout 17B (Gratuit)</option>
                    <option value="llama-3.1-8b-instant" data-provider="groq">Groq: Llama 3.1 8B (Ultra-Rapide)</option>
                    <option value="claude-sonnet-4.6" data-provider="claude">Claude 4.6 Sonnet</option>
                    <option value="claude-fable-5" data-provider="claude">Claude 5 Fable</option>
                </select>
                <button class="action-btn" id="btn-start-listening">🎤 Démarrer l'écoute</button>
                <p id="mic-status" class="status-text">Microphone inactif</p>
                <div class="transcript-debug" id="transcript-debug">En attente de voix...</div>
            </div>

            <div class="control-group sim-settings" id="sim-settings-panel">
                <label>Test manuel de l'interface :</label>
                <div style="display:flex; gap: 8px; margin-top:4px;">
                    <button class="btn" id="btn-sim-false" style="background:var(--color-false-bg); color:var(--color-false);">Faux</button>
                    <button class="btn" id="btn-sim-misleading" style="background:var(--color-misleading-bg); color:var(--color-misleading);">Nuancé</button>
                    <button class="btn" id="btn-sim-true" style="background:var(--color-true-bg); color:var(--color-true);">Vrai</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bouton Historique -->
    <button id="btn-toggle-history" class="history-toggle-btn">
        📋 Historique
    </button>

    <!-- Scripts fonctionnels -->
    <script src="claims_data.js"></script>
    <script src="audio_engine.js"></script>
    <script src="llm_client.js"></script>
    <script src="app.js"></script>
</body>
</html>
